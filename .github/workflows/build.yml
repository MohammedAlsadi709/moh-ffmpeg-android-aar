name: Build FFmpeg Android (Final No Install)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential yasm pkg-config

      - name: Clone FFmpeg
        run: |
          git clone https://github.com/ffmpeg/ffmpeg.git
          cd ffmpeg
          git checkout n6.0

      - name: Build FFmpeg
        run: |
          cd ffmpeg

          export NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          # ---------- arm64 ----------
          export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang

          ./configure \
            --target-os=android \
            --arch=aarch64 \
            --cc=$CC \
            --enable-cross-compile \
            --disable-static \
            --enable-shared \
            --disable-programs \
            --disable-doc \
            --enable-small \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swresample \
            --enable-swscale \
            --enable-avfilter \
            --enable-filter=volume \
            --enable-filter=apulsator \
            --enable-filter=amix \
            --enable-filter=concat \
            --enable-filter=atrim \
            --enable-filter=adelay \
            --enable-protocol=file \
            --enable-demuxer=mp3 \
            --enable-muxer=mp3 \
            --enable-decoder=mp3 \
            --enable-encoder=mp3 \
            --disable-vulkan \
            --disable-avdevice \
            --extra-ldflags="-Wl,-z,max-page-size=16384"

          make -j4

          mkdir -p output/arm64/lib
          cp libavcodec/*.so output/arm64/lib/
          cp libavformat/*.so output/arm64/lib/
          cp libavutil/*.so output/arm64/lib/
          cp libswresample/*.so output/arm64/lib/

          make clean

          # ---------- armv7 ----------
          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang

          ./configure \
            --target-os=android \
            --arch=arm \
            --cc=$CC \
            --enable-cross-compile \
            --disable-static \
            --enable-shared \
            --disable-programs \
            --disable-doc \
            --enable-small \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swresample \
            --enable-swscale \
            --enable-avfilter \
            --enable-filter=volume \
            --enable-filter=apulsator \
            --enable-filter=amix \
            --enable-filter=concat \
            --enable-filter=atrim \
            --enable-filter=adelay \
            --enable-protocol=file \
            --enable-demuxer=mp3 \
            --enable-muxer=mp3 \
            --enable-decoder=mp3 \
            --enable-encoder=mp3 \
            --disable-vulkan \
            --disable-avdevice \
            --extra-ldflags="-Wl,-z,max-page-size=16384"

          make -j4

          mkdir -p output/armv7/lib
          cp libavcodec/*.so output/armv7/lib/
          cp libavformat/*.so output/armv7/lib/
          cp libavutil/*.so output/armv7/lib/
          cp libswresample/*.so output/armv7/lib/

      - name: Upload FFmpeg libs
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs-optimized
          path: |
            ffmpeg/output/arm64/lib/*.so
            ffmpeg/output/armv7/lib/*.so
