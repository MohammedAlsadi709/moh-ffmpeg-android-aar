name: Build FFmpeg Android (FINAL STABLE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK r26
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_SDK_ROOT/ndk
          cd $ANDROID_SDK_ROOT/ndk
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          mv android-ndk-r26d r26

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential yasm pkg-config nasm unzip wget

      - name: Clone FFmpeg
        run: |
          git clone https://github.com/ffmpeg/ffmpeg.git
          cd ffmpeg
          git checkout n6.0

      - name: Build FFmpeg
        run: |
          cd ffmpeg

          export NDK=/usr/local/lib/android/sdk/ndk/r26
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          API=21

          export AR=$TOOLCHAIN/bin/llvm-ar
          export NM=$TOOLCHAIN/bin/llvm-nm
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          EXTRA_CFLAGS="-fPIC"
          EXTRA_LDFLAGS="-Wl,-z,max-page-size=16384"

          ############################
          # -------- arm64 ----------
          ############################
          export CC=$TOOLCHAIN/bin/aarch64-linux-android$API-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android$API-clang++

          ./configure \
            --target-os=android \
            --arch=aarch64 \
            --cc=$CC \
            --enable-cross-compile \
            --disable-static \
            --enable-shared \
            --disable-programs \
            --disable-doc \
            --disable-vulkan \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swresample \
            --enable-swscale \
            --enable-avfilter \
            --enable-postproc \
            --enable-network \
            --enable-protocols \
            --enable-demuxers \
            --enable-muxers \
            --enable-encoders \
            --enable-decoders \
            --enable-parsers \
            --enable-filters \
            --enable-bsfs \
            --extra-cflags="$EXTRA_CFLAGS" \
            --extra-ldflags="$EXTRA_LDFLAGS"

          make -j4

          # ⭐⭐ هذا السطر الجديد المهم ⭐⭐
          make install DESTDIR=android-install/arm64

          mkdir -p output/arm64/lib
          cp libavcodec/*.so output/arm64/lib/
          cp libavformat/*.so output/arm64/lib/
          cp libavutil/*.so output/arm64/lib/
          cp libswresample/*.so output/arm64/lib/
          cp libswscale/*.so output/arm64/lib/
          cp libavfilter/*.so output/arm64/lib/

          make clean

          ############################
          # -------- armv7 ----------
          ############################
          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++

          ./configure \
            --target-os=android \
            --arch=arm \
            --cc=$CC \
            --enable-cross-compile \
            --disable-static \
            --enable-shared \
            --disable-programs \
            --disable-doc \
            --disable-vulkan \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swresample \
            --enable-swscale \
            --enable-avfilter \
            --enable-postproc \
            --enable-network \
            --enable-protocols \
            --enable-demuxers \
            --enable-muxers \
            --enable-encoders \
            --enable-decoders \
            --enable-parsers \
            --enable-filters \
            --enable-bsfs \
            --extra-cflags="$EXTRA_CFLAGS" \
            --extra-ldflags="$EXTRA_LDFLAGS"

          make -j4

          # ⭐⭐ هذا السطر الجديد المهم ⭐⭐
          make install DESTDIR=android-install/armv7

          mkdir -p output/armv7/lib
          cp libavcodec/*.so output/armv7/lib/
          cp libavformat/*.so output/armv7/lib/
          cp libavutil/*.so output/armv7/lib/
          cp libswresample/*.so output/armv7/lib/
          cp libswscale/*.so output/armv7/lib/
          cp libavfilter/*.so output/armv7/lib/

      - name: Upload FFmpeg libs + headers
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-full
          path: |
            ffmpeg/output/arm64/lib/*.so
            ffmpeg/output/armv7/lib/*.so
            ffmpeg/android-install/**/usr/include/**
