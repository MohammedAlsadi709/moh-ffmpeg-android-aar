name: Build FFmpeg Android (FULL 16KB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential yasm pkg-config nasm

      - name: Clone FFmpeg
        run: |
          git clone https://github.com/ffmpeg/ffmpeg.git
          cd ffmpeg
          git checkout n6.0

      - name: Build FFmpeg
        run: |
          cd ffmpeg

          # ✅ FIX: استخدام النسخة الصحيحة من NDK
          export NDK=$ANDROID_NDK_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export API=21

          # أدوات إضافية (تحل مشاكل linking)
          export AR=$TOOLCHAIN/bin/llvm-ar
          export AS=$TOOLCHAIN/bin/aarch64-linux-android$API-clang
          export LD=$TOOLCHAIN/bin/ld
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          COMMON_FLAGS="\
          --target-os=android \
          --enable-cross-compile \
          --disable-static \
          --enable-shared \
          --disable-programs \
          --disable-doc \
          --enable-gpl \
          --enable-version3 \
          --enable-small \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swresample \
          --enable-swscale \
          --enable-avfilter \
          --enable-postproc \
          --enable-network \
          --enable-protocols \
          --enable-demuxers \
          --enable-muxers \
          --enable-encoders \
          --enable-decoders \
          --enable-parsers \
          --enable-filters \
          --enable-bsfs \
          --extra-ldflags='-Wl,-z,max-page-size=16384'"

          # ---------- arm64 ----------
          export CC=$TOOLCHAIN/bin/aarch64-linux-android$API-clang

          ./configure \
            $COMMON_FLAGS \
            --arch=aarch64 \
            --cc=$CC

          make -j4

          mkdir -p output/arm64/lib
          cp libavcodec/*.so output/arm64/lib/
          cp libavformat/*.so output/arm64/lib/
          cp libavutil/*.so output/arm64/lib/
          cp libswresample/*.so output/arm64/lib/
          cp libswscale/*.so output/arm64/lib/
          cp libavfilter/*.so output/arm64/lib/

          make clean

          # ---------- armv7 ----------
          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang

          ./configure \
            $COMMON_FLAGS \
            --arch=arm \
            --cc=$CC

          make -j4

          mkdir -p output/armv7/lib
          cp libavcodec/*.so output/armv7/lib/
          cp libavformat/*.so output/armv7/lib/
          cp libavutil/*.so output/armv7/lib/
          cp libswresample/*.so output/armv7/lib/
          cp libswscale/*.so output/armv7/lib/
          cp libavfilter/*.so output/armv7/lib/

      - name: Upload FFmpeg libs
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs-full
          path: |
            ffmpeg/output/arm64/lib/*.so
            ffmpeg/output/armv7/lib/*.so
