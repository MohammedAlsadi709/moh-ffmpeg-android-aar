name: Build FFmpeg Android (Step 1)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب المشروع
      - name: Checkout
        uses: actions/checkout@v3

      # 2. تثبيت NDK
      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26

      # 3. تثبيت الأدوات
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential yasm

      # 4. تحميل FFmpeg 6.0
      - name: Clone FFmpeg
        run: |
          git clone https://github.com/ffmpeg/ffmpeg.git
          cd ffmpeg
          git checkout n6.0

      # 5. Build للمعماريات
      - name: Build FFmpeg (arm64 + armv7)
        run: |
          cd ffmpeg

          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64

          # ---------- arm64 ----------
          export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang

          ./configure \
            --prefix=$(pwd)/output/arm64 \
            --target-os=android \
            --arch=arm64 \
            --enable-cross-compile \
            --cc=$CC \
            --disable-static \
            --enable-shared \
            --disable-doc \
            --disable-programs \
            --enable-small \
            --extra-ldflags="-Wl,-z,max-page-size=16384"

          make -j4
          make install
          make clean

          # ---------- armv7 ----------
          export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang

          ./configure \
            --prefix=$(pwd)/output/armv7 \
            --target-os=android \
            --arch=arm \
            --enable-cross-compile \
            --cc=$CC \
            --disable-static \
            --enable-shared \
            --disable-doc \
            --disable-programs \
            --enable-small \
            --extra-ldflags="-Wl,-z,max-page-size=16384"

          make -j4
          make install

      # 6. رفع النتيجة
      - name: Upload FFmpeg libs
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs
          path: |
            ffmpeg/output/arm64/lib/*.so
            ffmpeg/output/armv7/lib/*.so
